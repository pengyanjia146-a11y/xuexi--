name: Build Android APK v9 Quality Low Input

"on":
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Show repository files
        run: |
          echo "Current directory:"
          pwd
          echo "Repository files:"
          find . -maxdepth 5 -type f | sort
          echo "Find settings.gradle:"
          find . -maxdepth 5 \( -name "settings.gradle" -o -name "settings.gradle.kts" \) -print

      - name: Find Gradle root
        id: gradle_root
        run: |
          ROOT_FILE=$(find . -maxdepth 5 \( -name "settings.gradle" -o -name "settings.gradle.kts" \) | head -n 1)
          if [ -z "$ROOT_FILE" ]; then
            echo "ERROR: 未找到 settings.gradle。说明你没有把完整工程上传到仓库，或上传位置错了。"
            echo "正确结构：仓库首页直接看到 .github、app、build.gradle、settings.gradle。"
            exit 1
          fi
          ROOT_DIR=$(dirname "$ROOT_FILE")
          echo "Gradle root = $ROOT_DIR"
          echo "root=$ROOT_DIR" >> "$GITHUB_OUTPUT"

      - name: Build debug APK
        working-directory: ${{ steps.gradle_root.outputs.root }}
        run: gradle clean :app:assembleDebug --stacktrace --warning-mode all

      - name: List APK outputs
        run: |
          echo "APK files generated:"
          find . -type f -name "*.apk" -print

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: student-reflect-v9-quality-low-input-apk
          path: |
            **/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
