<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>学习质量量化</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--orange:#ea580c;--purple:#7c3aed;--shadow:0 8px 24px rgba(15,23,42,.08)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",Arial,sans-serif;font-size:15px}button,input,select,textarea{font:inherit}button{border:0;border-radius:14px;padding:10px 12px;background:#eef2ff;color:#1e40af;font-weight:700}button:active{transform:scale(.98)}.danger{background:#fee2e2;color:#991b1b}.ok{background:#dcfce7;color:#166534}.warn{background:#ffedd5;color:#9a3412}.dark{background:#111827;color:#fff}.plain{background:#f3f4f6;color:#374151}.primary{background:var(--blue);color:#fff}.small{font-size:12px;padding:6px 8px;border-radius:10px}.wrap{max-width:520px;margin:0 auto;padding-bottom:76px}.top{position:sticky;top:0;background:rgba(246,247,251,.94);backdrop-filter:blur(10px);z-index:5;padding:10px 12px 6px;border-bottom:1px solid var(--line)}.title{font-weight:900;font-size:19px}.sub{color:var(--muted);font-size:12px;margin-top:2px}.grid{display:grid;gap:10px}.grid2{grid-template-columns:1fr 1fr}.grid3{grid-template-columns:repeat(3,1fr)}.card{background:var(--card);margin:10px 12px;padding:14px;border-radius:18px;box-shadow:var(--shadow)}.card h3{margin:0 0 10px;font-size:16px}.statrow{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.stat{background:#f8fafc;border:1px solid var(--line);border-radius:14px;padding:8px;text-align:center}.stat b{display:block;font-size:18px}.stat span{color:var(--muted);font-size:11px}.bigscore{font-size:38px;font-weight:950;line-height:1}.muted{color:var(--muted)}.chipbox{display:flex;flex-wrap:wrap;gap:8px}.chip{border:1px solid var(--line);background:#fff;color:#374151;border-radius:999px;padding:8px 10px;font-weight:700}.chip.on{background:#dbeafe;border-color:#60a5fa;color:#1d4ed8}.chip.green.on{background:#dcfce7;border-color:#4ade80;color:#166534}.chip.red.on{background:#fee2e2;border-color:#fca5a5;color:#991b1b}.chip.purple.on{background:#ede9fe;border-color:#a78bfa;color:#5b21b6}.field{margin:10px 0}.field label{display:block;color:#374151;font-size:13px;font-weight:800;margin-bottom:6px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:11px;background:#fff;color:#111827}textarea{min-height:82px;resize:vertical}.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);z-index:20}.navin{max-width:520px;margin:0 auto;display:grid;grid-template-columns:repeat(6,1fr)}.nav button{border-radius:0;background:#fff;color:#6b7280;padding:8px 0;font-size:12px}.nav button.on{color:var(--blue);font-weight:900}.page{display:none}.page.on{display:block}.timeline{border-left:3px solid #dbeafe;margin-left:8px;padding-left:10px}.item{background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px;margin:8px 0}.item .row{display:flex;justify-content:space-between;gap:8px;align-items:center}.bar{height:8px;background:#e5e7eb;border-radius:999px;overflow:hidden}.bar i{display:block;height:100%;background:#2563eb;border-radius:999px}.radar{width:100%;max-width:280px;margin:0 auto;display:block}.toast{position:fixed;left:50%;bottom:78px;transform:translateX(-50%);background:#111827;color:white;padding:10px 14px;border-radius:999px;z-index:50;opacity:0;transition:.25s;pointer-events:none}.toast.show{opacity:1}.modal{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;z-index:40;align-items:flex-end}.modal.on{display:flex}.sheet{background:#fff;border-radius:22px 22px 0 0;padding:16px;max-height:88vh;overflow:auto;width:100%;max-width:520px;margin:0 auto}.sheet h3{margin:0 0 10px}.split{display:flex;gap:8px;align-items:center}.split>*{flex:1}.pill{display:inline-block;font-size:11px;border-radius:999px;padding:3px 7px;background:#f3f4f6;color:#374151;margin:2px}.scoreline{display:grid;grid-template-columns:86px 1fr 42px;gap:8px;align-items:center;margin:8px 0}.scoreline .bar{height:10px}.hidden{display:none!important}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:12px}.quick4{display:grid;grid-template-columns:1fr 1fr;gap:10px}.quick4 button{padding:16px 8px;font-size:16px}.photo{width:100%;max-height:150px;object-fit:cover;border-radius:12px;border:1px solid var(--line);margin-top:8px}.sectionTitle{font-size:13px;color:#6b7280;font-weight:900;margin:12px 0 6px}.checkcard{border:1px solid var(--line);border-radius:14px;padding:9px;background:#fff}.checkcard.on{border-color:#60a5fa;background:#eff6ff}.footerNote{font-size:12px;color:#6b7280;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><div class="title">学习质量量化</div><div id="todayLine" class="sub">低输入：点选记录，自动反馈</div></div>

  <section id="home" class="page on">
    <div class="card">
      <div class="split"><div><div class="muted">今日学习质量分</div><div class="bigscore" id="homeScore">--</div></div><svg id="homeRadar" class="radar" viewBox="0 0 220 180"></svg></div>
      <div class="statrow" style="margin-top:10px"><div class="stat"><b id="homeDeep">0</b><span>深度min</span></div><div class="stat"><b id="homeTasks">0/0</b><span>任务</span></div><div class="stat"><b id="homeLoop">0</b><span>闭环错题</span></div><div class="stat"><b id="homeDue">0</b><span>待回测</span></div></div>
    </div>
    <div class="card quick4">
      <button class="primary" onclick="openStartStudy()">开始学习</button>
      <button onclick="openMistake()">添加错题</button>
      <button onclick="go('review')">待回测</button>
      <button onclick="go('feedback')">今日反馈</button>
    </div>
    <div class="card">
      <h3>当前计时</h3>
      <div class="split"><div><div class="muted">当前状态</div><b id="currentStateName">未开始</b></div><div style="text-align:right"><div class="muted">读秒</div><b id="currentSeconds">00:00:00</b></div></div>
      <div class="split" style="margin-top:10px"><button onclick="openSwitchState()">切换状态</button><button class="danger" onclick="endToday()">结束今天</button></div>
    </div>
    <div class="card"><h3>明日行动建议</h3><div id="homeSuggestions"></div></div>
  </section>

  <section id="tasks" class="page">
    <div class="card"><h3>快速创建任务</h3><div class="grid2 grid"><button onclick="openTaskQuick()">模板创建</button><button onclick="copyYesterdayTasks()">复制昨日未完成</button><button onclick="createFromDueReviews()">从待回测生成</button><button onclick="addSuggestedTasks()">导入建议任务</button></div></div>
    <div class="card"><h3>今日任务</h3><div id="taskList"></div></div>
  </section>

  <section id="mistakes" class="page">
    <div class="card"><h3>错题极简记录</h3><button class="primary" onclick="openMistake()">拍照/添加错题</button><button style="margin-left:8px" onclick="toggleBatchMistakes()">批量操作</button></div>
    <div class="card"><h3>错题列表</h3><div id="mistakeList"></div></div>
  </section>

  <section id="review" class="page">
    <div class="card"><h3>今日待回测</h3><div id="reviewList"></div></div>
    <div class="card"><h3>背诵/默写快速记录</h3><button onclick="openMemoryTask()">添加背诵任务</button><div id="memoryList"></div></div>
  </section>

  <section id="feedback" class="page">
    <div class="card"><h3>今日反馈</h3><div id="feedbackSummary"></div><div id="scoreLines"></div></div>
    <div class="card"><h3>每日复盘：点选 + 短句</h3><div class="sectionTitle">今天最大问题</div><div id="issueChips" class="chipbox"></div><div class="sectionTitle">今天主要收获</div><div id="gainChips" class="chipbox"></div><div class="field"><label>补充一句，可不写</label><textarea id="reflectText" placeholder="例如：函数分类讨论漏 x<0。"></textarea></div><button class="primary" onclick="saveReflection()">保存复盘并生成明日建议</button></div>
    <div class="card"><h3>一键生成明日任务</h3><div id="feedbackSuggestions"></div></div>
  </section>

  <section id="settings" class="page">
    <div class="card"><h3>权限显示模块</h3><div id="permBox"></div><button onclick="refreshPermission()">刷新权限</button><button onclick="openUsageSettings()">打开使用情况访问权限</button></div>
    <div class="card"><h3>状态/科目/类型维护</h3><div class="grid2 grid"><button onclick="openManageStates()">学习状态排序</button><button onclick="openManageSubjects()">科目知识点</button><button onclick="openManageAppTypes()">App类型</button><button onclick="queryUsageNow()">读取今日使用记录</button></div></div>
    <div class="card"><h3>App 归类：打勾式选择</h3><div id="appRuleList"></div></div>
    <div class="card"><h3>JSON 备份</h3><div class="grid2 grid"><button onclick="exportAll()">导出全部JSON</button><button onclick="exportAppTypes()">导出类型JSON</button><button onclick="copyJsonBox()">复制文本框</button><button onclick="saveJsonFile()">保存JSON文件</button></div><textarea id="jsonBox" class="mono" placeholder="导出内容会在这里，也可以粘贴后导入"></textarea><div class="grid2 grid"><button onclick="importAll()">导入全部</button><button onclick="importAppTypes()">导入类型</button></div></div>
  </section>
</div>
<div class="nav"><div class="navin"><button id="nav_home" class="on" onclick="go('home')">首页</button><button id="nav_tasks" onclick="go('tasks')">任务</button><button id="nav_mistakes" onclick="go('mistakes')">错题</button><button id="nav_review" onclick="go('review')">复习</button><button id="nav_feedback" onclick="go('feedback')">反馈</button><button id="nav_settings" onclick="go('settings')">设置</button></div></div>
<div id="modal" class="modal"><div class="sheet"><div class="split"><h3 id="modalTitle">操作</h3><button class="small plain" onclick="closeModal()">关闭</button></div><div id="modalBody"></div></div></div><div id="toast" class="toast">已保存</div>
<script>
const KEY='student_reflect_quality_v9';
const today=()=>new Date().toISOString().slice(0,10);
const addDays=(d,n)=>{const x=new Date(d+'T00:00:00');x.setDate(x.getDate()+n);return x.toISOString().slice(0,10)};
const fmtTime=ms=>{let s=Math.max(0,Math.floor(ms/1000));let h=Math.floor(s/3600);s%=3600;let m=Math.floor(s/60);s%=60;return [h,m,s].map(x=>String(x).padStart(2,'0')).join(':')};
const fmtMin=ms=>Math.round(ms/60000);
const id=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const subjects=['数学','英语','语文','物理','化学','生物','历史','政治','地理','其他'];
const taskTypes=['完成作业','刷题训练','错题订正','错题回测','专题训练','限时训练','单词背诵','中译英默写','阅读训练','完形填空','语法填空','作文修改','听力训练','古诗文背诵','文言文翻译','现代文阅读','作文训练','知识点背诵','材料题训练','主观题整理','实验题复习','公式/方程式记忆','自我测试','间隔复习','总结输出'];
const reasons=['概念不清','基础不牢','审题错误','计算错误','公式记错','方法不会','题型不熟','步骤遗漏','时间不够','粗心失误','表达不规范','背诵不牢','其他'];
const strategies=['主动回忆','自我测试','间隔复习','错题复盘','输出讲解','变式训练','总结规律','知识点对比'];
const focusRates={'几乎全程专注':.9,'大部分专注':.75,'一般':.55,'分心较多':.35};
const issueOptions=['作业没完成','分心较多','错题没回测','背诵没默写','考试失分多','睡眠不足','任务太多','时间安排差','知识点不会','其他'];
const gainOptions=['完成作业','解决错题','完成背诵','回测通过','考试分析完成','专注较好','掌握新知识','其他'];
let data=load();let activePage='home';let timerInt=null;let batchMistake=false;
function load(){let d;try{d=JSON.parse(localStorage.getItem(KEY)||'{}')}catch(e){d={}};return Object.assign({tasks:[],mistakes:[],sessions:[],reviews:[],memory:[],reflections:{},states:['数学学习','英语学习','语文学习','物理学习','化学学习','深度学习','错题回测','背诵默写','吃饭','休息','运动','睡眠','通勤','游戏娱乐','其他'],subjects:[...subjects],knowledge:{},appTypes:[{name:'学习类应用',allowed:true,severity:0},{name:'微信必要沟通',allowed:true,severity:0},{name:'短视频/娱乐刷屏',allowed:false,severity:3},{name:'游戏/游戏软件',allowed:false,severity:3},{name:'浏览器/网页跑偏',allowed:false,severity:1.5},{name:'非必要聊天',allowed:false,severity:2},{name:'音乐/视频/影视',allowed:false,severity:2.5},{name:'工具类但跑偏',allowed:false,severity:1},{name:'系统/息屏忽略',allowed:true,severity:0},{name:'其他应用',allowed:false,severity:1}],appRules:{},usageEvents:[],day:{date:today(),running:false,currentState:null,startAt:null,stateStartAt:null}},d)}
function save(){localStorage.setItem(KEY,JSON.stringify(data));}
function toast(t='已保存'){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1600)}
function go(p){activePage=p;document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));document.getElementById(p).classList.add('on');document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('on'));document.getElementById('nav_'+p).classList.add('on');render()}
function openModal(title,html){document.getElementById('modalTitle').textContent=title;document.getElementById('modalBody').innerHTML=html;document.getElementById('modal').classList.add('on')}
function closeModal(){document.getElementById('modal').classList.remove('on')}
function chipHtml(arr,cls='chip',name='chip',selected=[]){return arr.map(x=>`<button class="${cls} ${selected.includes(x)?'on':''}" data-v="${x}" onclick="toggleChip(this,'${name}')">${selected.includes(x)?'✓ ':''}${x}</button>`).join('')}
function toggleChip(btn,name){btn.classList.toggle('on');btn.textContent=(btn.classList.contains('on')?'✓ ':'')+btn.dataset.v}
function getChips(container){return [...container.querySelectorAll('.chip.on')].map(x=>x.dataset.v)}
function render(){document.getElementById('todayLine').textContent=today()+' · 记录、统计、复盘、评分';renderHome();renderTasks();renderMistakes();renderReviews();renderFeedback();renderSettings()}
function ensureDay(){if(!data.day||data.day.date!==today())data.day={date:today(),running:false,currentState:null,startAt:null,stateStartAt:null};}
function openStartStudy(){ensureDay();let html=`<div class="field"><label>选择学习状态</label><div class="chipbox">${data.states.map((s,i)=>`<button class="chip ${i==0?'on':''}" data-v="${s}" onclick="document.querySelectorAll('#stateStart .chip').forEach(x=>x.classList.remove('on'));this.classList.add('on')">${i==0?'✓ ':''}${s}</button>`).join('')}</div></div><button class="primary" onclick="startToday()">开始</button>`;openModal('开始学习',`<div id="stateStart">${html}</div>`)}
function startToday(){ensureDay();const s=document.querySelector('#stateStart .chip.on')?.dataset.v||data.states[0];const now=Date.now();if(!data.day.running){data.day={date:today(),running:true,currentState:s,startAt:now,stateStartAt:now};}else{switchStateTo(s)};save();closeModal();render();toast('开始计时')}
function openSwitchState(){if(!data.day.running){openStartStudy();return}let html=`<div class="chipbox">${data.states.map(s=>`<button class="chip" data-v="${s}" onclick="switchStateTo('${s.replace(/'/g,"\\'")}');closeModal();render()">${s}</button>`).join('')}</div>`;openModal('切换状态',html)}
function switchStateTo(s){ensureDay();const now=Date.now();if(data.day.running&&data.day.currentState){data.sessions.push({id:id(),date:today(),state:data.day.currentState,start:data.day.stateStartAt,end:now,type:inferStateType(data.day.currentState)});}data.day.currentState=s;data.day.stateStartAt=now;data.day.running=true;if(!data.day.startAt)data.day.startAt=now;save()}
function inferStateType(s){if(/深度/.test(s))return'深度学习';if(/学习|错题|背诵|默写|回测|训练|作业/.test(s))return'学习';if(/游戏|娱乐/.test(s))return'娱乐';if(/睡/.test(s))return'睡眠';if(/休/.test(s))return'休息';return'其他'}
function endToday(){ensureDay();if(!data.day.running){toast('今天未开始');return}finishCurrentStudyConfirm(true)}
function finishCurrentStudyConfirm(endDay=false){const dur=Date.now()-data.day.stateStartAt;let html=`<p>本次时长：<b>${fmtTime(dur)}</b></p><div class="sectionTitle">深度专注程度</div><div id="focusPick" class="chipbox">${Object.keys(focusRates).map((x,i)=>`<button class="chip ${i==1?'on':''}" data-v="${x}" onclick="document.querySelectorAll('#focusPick .chip').forEach(c=>c.classList.remove('on'));this.classList.add('on')">${i==1?'✓ ':''}${x}</button>`).join('')}</div><div class="sectionTitle">任务是否完成</div><div id="finishPick" class="chipbox">${['已完成','完成一部分','未完成'].map((x,i)=>`<button class="chip ${i==0?'on':''}" data-v="${x}" onclick="document.querySelectorAll('#finishPick .chip').forEach(c=>c.classList.remove('on'));this.classList.add('on')">${i==0?'✓ ':''}${x}</button>`).join('')}</div><div class="sectionTitle">是否产生错题</div><div class="grid3 grid"><button onclick="saveSessionConfirm(${endDay},'none')">没有</button><button onclick="saveSessionConfirm(${endDay},'later')">有，稍后添加</button><button onclick="saveSessionConfirm(${endDay},'now')">有，立即添加</button></div>`;openModal('结束本段学习确认',html)}
function saveSessionConfirm(endDay, mistake){const focus=document.querySelector('#focusPick .chip.on')?.dataset.v||'大部分专注';const fin=document.querySelector('#finishPick .chip.on')?.dataset.v||'已完成';const now=Date.now();const dur=now-data.day.stateStartAt;data.sessions.push({id:id(),date:today(),state:data.day.currentState,start:data.day.stateStartAt,end:now,type:inferStateType(data.day.currentState),focus,deepMs:dur*(focusRates[focus]||.7),finish:fin});if(endDay){data.day.running=false;data.day.currentState=null;data.day.stateStartAt=null}else{data.day.stateStartAt=now}save();closeModal();if(mistake==='now')openMistake();else if(mistake==='later')toast('已记录，可稍后添加错题');render()}
function openTaskQuick(){const subject=data.subjects[0]||'数学';let html=`<div class="field"><label>科目</label><div id="taskSubject" class="chipbox">${chipHtml(data.subjects,'chip','s',[subject])}</div></div><div class="field"><label>任务类型</label><div id="taskType" class="chipbox">${chipHtml(taskTypes,'chip','t',[taskTypes[0]])}</div></div><div class="split"><div class="field"><label>知识点/标题，可空</label><input id="taskKnow" placeholder="函数 / U11 / 动量"></div><div class="field"><label>数量</label><select id="taskQty"><option>1</option><option>3</option><option>5</option><option>10</option><option>20</option></select></div></div><div class="split"><div class="field"><label>预计时间</label><select id="taskMin"><option>15</option><option selected>30</option><option>45</option><option>60</option><option>90</option></select></div><div class="field"><label>难度</label><select id="taskDiff"><option>低</option><option selected>中</option><option>高</option></select></div></div><div class="field"><label>策略标签</label><div id="taskStrategies" class="chipbox">${chipHtml(strategies,'chip green','st',[])}</div></div><button class="primary" onclick="addTaskFromQuick()">创建任务</button>`;openModal('模板创建任务',html)}
function addTaskFromQuick(){const sub=document.querySelector('#taskSubject .chip.on')?.dataset.v||'数学';const type=document.querySelector('#taskType .chip.on')?.dataset.v||'刷题训练';const know=document.getElementById('taskKnow').value.trim();const qty=document.getElementById('taskQty').value;const min=document.getElementById('taskMin').value;const diff=document.getElementById('taskDiff').value;const sts=getChips(document.getElementById('taskStrategies'));const name=`${sub}：${type}${know?'（'+know+'）':''} ${qty}项，${min}分钟`;data.tasks.push({id:id(),date:today(),subject:sub,type,knowledge:know,qty:+qty,planMin:+min,difficulty:diff,name,standard:autoStandard(sub,type,know,qty),status:'未完成',quality:'未评',strategies:sts});save();closeModal();render();toast('任务已创建')}
function autoStandard(sub,type,know,qty){if(/错题回测/.test(type))return `${sub}：完成 ${qty} 道${know||''}错题回测，要求不看答案独立做对。`;if(/单词|默写|背诵/.test(type))return `${sub}：完成${know||'背诵内容'}，并进行遮挡自测或默写。`;if(/刷题|训练/.test(type))return `${sub}：完成 ${qty} 项${know||''}训练，做完后标记错因。`;return `${sub}：完成 ${type}${know?'（'+know+'）':''}。`}
function renderTasks(){const box=document.getElementById('taskList');if(!box)return;const list=data.tasks.filter(t=>t.date===today());box.innerHTML=list.length?list.map(t=>`<div class="item"><div class="row"><b>${t.name}</b><span class="pill">${t.status}</span></div><div class="muted">${t.standard}</div><div style="margin-top:8px" class="chipbox"><button class="small ok" onclick="setTaskStatus('${t.id}','已完成')">已完成</button><button class="small warn" onclick="setTaskStatus('${t.id}','完成一部分')">部分</button><button class="small danger" onclick="setTaskStatus('${t.id}','未完成')">未完成</button><button class="small" onclick="copyTaskTomorrow('${t.id}')">移到明日</button></div></div>`).join(''):'<div class="muted">暂无任务，点“模板创建”。</div>'}
function setTaskStatus(tid,st){let t=data.tasks.find(x=>x.id===tid);if(t){t.status=st;save();render()}}
function copyTaskTomorrow(tid){let t=data.tasks.find(x=>x.id===tid);if(t){data.tasks.push({...t,id:id(),date:addDays(today(),1),status:'未完成'});save();toast('已加入明日')}}
function copyYesterdayTasks(){const y=addDays(today(),-1);data.tasks.filter(t=>t.date===y&&t.status!=='已完成').forEach(t=>data.tasks.push({...t,id:id(),date:today(),status:'未完成'}));save();render();toast('已复制昨日未完成')}
function createFromDueReviews(){dueMistakes().slice(0,8).forEach(m=>data.tasks.push({id:id(),date:today(),subject:m.subject,type:'错题回测',knowledge:m.knowledge||'',qty:1,planMin:10,difficulty:'中',name:`${m.subject}：${m.knowledge||''}错题回测`,standard:'不看答案独立重做，完成后点回测结果。',status:'未完成',quality:'未评',strategies:['自我测试','间隔复习','错题复盘']}));save();render();toast('已生成回测任务')}
function addSuggestedTasks(){generateSuggestions().forEach(s=>data.tasks.push({id:id(),date:addDays(today(),1),subject:s.subject||'其他',type:s.type||'明日调整',knowledge:s.knowledge||'',qty:s.qty||1,planMin:s.min||30,difficulty:'中',name:s.text,standard:s.text,status:'未完成',quality:'未评',strategies:s.strategies||[]}));save();toast('建议已加入明日任务')}
function openMistake(){let html=`<div class="field"><label>题目图片</label><input id="mistakePhoto" type="file" accept="image/*" capture="environment" onchange="previewMistakePhoto(event)"><img id="mistakePreview" class="photo hidden"></div><div class="field"><label>科目</label><div id="mSub" class="chipbox">${chipHtml(data.subjects,'chip','ms',[data.subjects[0]||'数学'])}</div></div><div class="field"><label>知识点，可空</label><input id="mKnow" placeholder="函数 / 动量 / U11"></div><div class="field"><label>错因</label><div id="mReason" class="chipbox">${chipHtml(reasons,'chip red','mr',[reasons[0]])}</div></div><div class="field"><label>当前状态</label><div id="mStatus" class="chipbox">${chipHtml(['未处理','已订正','已独立重做'],'chip','mst',['未处理'])}</div></div><button class="primary" onclick="saveMistake()">保存错题</button>`;openModal('添加错题（20秒）',html)}
function previewMistakePhoto(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{const img=document.getElementById('mistakePreview');img.src=r.result;img.classList.remove('hidden')};r.readAsDataURL(f)}
function saveMistake(){const img=document.getElementById('mistakePreview');data.mistakes.push({id:id(),date:today(),subject:document.querySelector('#mSub .chip.on')?.dataset.v||'数学',knowledge:document.getElementById('mKnow').value.trim(),photo:img&&!img.classList.contains('hidden')?img.src:'',reason:document.querySelector('#mReason .chip.on')?.dataset.v||'其他',status:document.querySelector('#mStatus .chip.on')?.dataset.v||'未处理',mastery:1,errorCount:1,nextReview:addDays(today(),1),history:[]});save();closeModal();render();toast('错题已保存')}
function renderMistakes(){const box=document.getElementById('mistakeList');if(!box)return;box.innerHTML=data.mistakes.length?data.mistakes.slice().reverse().map(m=>`<div class="item"><div class="row"><b>${m.subject} ${m.knowledge||''}</b><span class="pill">${m.status}</span></div>${m.photo?`<img class="photo" src="${m.photo}">`:''}<div class="muted">错因：${m.reason}｜掌握 ${m.mastery}/5｜下次 ${m.nextReview||'未定'}</div><div class="chipbox" style="margin-top:8px"><button class="small" onclick="mistakeStep('${m.id}','已订正')">已订正</button><button class="small" onclick="mistakeStep('${m.id}','已独立重做')">独立重做</button><button class="small ok" onclick="reviewMistake('${m.id}','完全会')">完全会</button><button class="small warn" onclick="reviewMistake('${m.id}','有点忘')">有点忘</button><button class="small danger" onclick="reviewMistake('${m.id}','不会')">不会</button>${batchMistake?`<button class="small danger" onclick="deleteMistake('${m.id}')">删除</button>`:''}</div></div>`).join(''):'<div class="muted">暂无错题。</div>'}
function mistakeStep(mid,st){let m=data.mistakes.find(x=>x.id===mid);if(m){m.status=st;if(st==='已独立重做')m.nextReview=addDays(today(),1);save();render()}}
function reviewMistake(mid,res){let m=data.mistakes.find(x=>x.id===mid);if(!m)return;m.history.push({date:today(),result:res});if(res==='完全会'){m.mastery=Math.min(5,(m.mastery||1)+1);m.status=m.mastery>=5?'已掌握':(m.mastery>=4?'一周回测通过':'隔天回测通过');m.nextReview=addDays(today(),m.mastery>=4?14:7)}else if(res==='有点忘'){m.nextReview=addDays(today(),2)}else{m.errorCount=(m.errorCount||0)+1;m.mastery=Math.max(1,(m.mastery||1)-1);m.nextReview=addDays(today(),1);m.status='未处理'}save();render();toast('回测已记录')}
function deleteMistake(mid){data.mistakes=data.mistakes.filter(x=>x.id!==mid);save();render()}
function toggleBatchMistakes(){batchMistake=!batchMistake;renderMistakes()}
function dueMistakes(){return data.mistakes.filter(m=>(m.nextReview||'9999-99-99')<=today()&&m.status!=='已掌握')}
function renderReviews(){const box=document.getElementById('reviewList');if(!box)return;const due=dueMistakes();box.innerHTML=due.length?due.map(m=>`<div class="item"><div class="row"><b>${m.subject} ${m.knowledge||''}</b><span class="pill">${m.reason}</span></div>${m.photo?`<img class="photo" src="${m.photo}">`:''}<div class="grid3 grid" style="margin-top:8px"><button class="ok" onclick="reviewMistake('${m.id}','完全会')">完全会</button><button class="warn" onclick="reviewMistake('${m.id}','有点忘')">有点忘</button><button class="danger" onclick="reviewMistake('${m.id}','不会')">不会</button></div></div>`).join(''):'<div class="muted">今天没有待回测错题。</div>';renderMemory()}
function openMemoryTask(){let html=`<div class="field"><label>科目</label><div id="memSub" class="chipbox">${chipHtml(data.subjects,'chip','mms',[data.subjects[1]||'英语'])}</div></div><div class="field"><label>类型</label><div id="memType" class="chipbox">${chipHtml(['单词','古诗文','公式/方程式','知识点','作文素材'],'chip','mmt',['单词'])}</div></div><div class="field"><label>标题</label><input id="memTitle" placeholder="U11 单词"></div><div class="field"><label>复习节奏</label><div id="memSchedule" class="chipbox">${chipHtml(['第2天','第4天','第7天','第14天'],'chip green','mmsch',['第2天','第4天','第7天'])}</div></div><button class="primary" onclick="saveMemoryTask()">保存背诵任务</button>`;openModal('背诵/默写任务',html)}
function saveMemoryTask(){const sched=getChips(document.getElementById('memSchedule'));data.memory.push({id:id(),date:today(),subject:document.querySelector('#memSub .chip.on')?.dataset.v||'英语',type:document.querySelector('#memType .chip.on')?.dataset.v||'单词',title:document.getElementById('memTitle').value.trim()||'背诵任务',schedule:sched,nextReview:addDays(today(),2),status:'未完成',history:[]});save();closeModal();render()}
function renderMemory(){const box=document.getElementById('memoryList');if(!box)return;box.innerHTML=data.memory.slice(-5).reverse().map(m=>`<div class="item"><b>${m.subject} ${m.title}</b><div class="muted">${m.type}｜下次 ${m.nextReview}</div><div class="chipbox" style="margin-top:8px">${['已背','已默写','全对','少量错误','错误较多','不会'].map(x=>`<button class="small" onclick="memoryResult('${m.id}','${x}')">${x}</button>`).join('')}</div></div>`).join('')}
function memoryResult(mid,res){let m=data.memory.find(x=>x.id===mid);if(!m)return;m.history.push({date:today(),result:res});m.status=res;if(res==='全对')m.nextReview=addDays(today(),7);else if(res==='少量错误')m.nextReview=addDays(today(),3);else m.nextReview=addDays(today(),1);save();render();toast('已记录')}
function calcScores(date=today()){const tasks=data.tasks.filter(t=>t.date===date);const sess=data.sessions.filter(s=>s.date===date);const mistakes=data.mistakes.filter(m=>m.date===date);const refl=data.reflections[date]||{};const totalStudy=sess.filter(s=>['学习','深度学习'].includes(s.type)).reduce((a,b)=>a+(b.end-b.start),0);const deep=sess.reduce((a,b)=>a+(b.deepMs||(['深度学习'].includes(b.type)?b.end-b.start:0)),0);const taskScore=tasks.length?tasks.filter(t=>t.status==='已完成').length/tasks.length*100:70;const deepRate=totalStudy?Math.min(100,deep/totalStudy*100):0;const strategyCount=tasks.reduce((a,t)=>a+(t.strategies||[]).length,0);const strategyScore=Math.min(100,strategyCount*18+data.mistakes.filter(m=>(m.history||[]).some(h=>h.date===date)).length*10);const loops=data.mistakes.filter(m=>m.reason&&['已独立重做','隔天回测通过','一周回测通过','已掌握'].includes(m.status)).length;const loopScore=Math.min(100,loops*18+mistakes.length*8);const due=dueMistakes().length;const reviewToday=data.mistakes.flatMap(m=>(m.history||[]).filter(h=>h.date===date));const reviewScore=reviewToday.length?reviewToday.filter(h=>h.result==='完全会').length/reviewToday.length*100:Math.max(45,100-due*8);const mindScore=(refl.issues||[]).includes('睡眠不足')?55:80;const reflectScore=(refl.issues?.length||0)+(refl.gains?.length||0)+(refl.text?1:0)>1?90:35;const dims={计划执行:taskScore,深度专注:deepRate,主动回忆:strategyScore,错题闭环:loopScore,间隔复习:reviewScore,身心状态:mindScore};const quality=Math.round(taskScore*.10+deepRate*.15+strategyScore*.20+loopScore*.25+reviewScore*.15+reflectScore*.10+mindScore*.05);return{quality,dims,totalStudy,deep,tasks,loops,due,reviewToday,reflectScore}}
function renderHome(){const s=calcScores();document.getElementById('homeScore').textContent=s.quality;document.getElementById('homeDeep').textContent=Math.round(s.deep/60000);document.getElementById('homeTasks').textContent=`${s.tasks.filter(t=>t.status==='已完成').length}/${s.tasks.length}`;document.getElementById('homeLoop').textContent=s.loops;document.getElementById('homeDue').textContent=s.due;drawRadar('homeRadar',s.dims);document.getElementById('homeSuggestions').innerHTML=renderSuggestions(generateSuggestions())}
function drawRadar(id,dims){const el=document.getElementById(id);if(!el)return;const vals=Object.values(dims);const keys=Object.keys(dims);const cx=110,cy=90,r=60;const pts=vals.map((v,i)=>{const a=-Math.PI/2+i*2*Math.PI/vals.length;const rr=r*v/100;return [cx+Math.cos(a)*rr,cy+Math.sin(a)*rr]});const outer=vals.map((v,i)=>{const a=-Math.PI/2+i*2*Math.PI/vals.length;return [cx+Math.cos(a)*r,cy+Math.sin(a)*r]});el.innerHTML=`<polygon points="${outer.map(p=>p.join(',')).join(' ')}" fill="#f8fafc" stroke="#d1d5db"/><polygon points="${pts.map(p=>p.join(',')).join(' ')}" fill="rgba(37,99,235,.25)" stroke="#2563eb" stroke-width="2"/>`+outer.map((p,i)=>`<text x="${p[0]}" y="${p[1]+(p[1]>cy?14:-6)}" text-anchor="middle" font-size="10" fill="#374151">${keys[i]}</text>`).join('')}
function renderFeedback(){const s=calcScores();document.getElementById('feedbackSummary').innerHTML=`<div class="bigscore">${s.quality}</div><div class="muted">分数评价的是今天学习过程，不评价人。</div>`;document.getElementById('scoreLines').innerHTML=Object.entries(s.dims).map(([k,v])=>`<div class="scoreline"><b>${k}</b><div class="bar"><i style="width:${Math.round(v)}%"></i></div><span>${Math.round(v)}</span></div>`).join('');renderReflectChips();document.getElementById('feedbackSuggestions').innerHTML=renderSuggestions(generateSuggestions())}
function renderReflectChips(){const refl=data.reflections[today()]||{issues:[],gains:[]};document.getElementById('issueChips').innerHTML=chipHtml(issueOptions,'chip red','issue',refl.issues||[]);document.getElementById('gainChips').innerHTML=chipHtml(gainOptions,'chip green','gain',refl.gains||[]);document.getElementById('reflectText').value=refl.text||''}
function saveReflection(){data.reflections[today()]={issues:getChips(document.getElementById('issueChips')),gains:getChips(document.getElementById('gainChips')),text:document.getElementById('reflectText').value.trim(),updatedAt:Date.now()};save();render();toast('复盘已保存')}
function generateSuggestions(){const s=calcScores();let arr=[];if(s.due>0)arr.push({text:`优先完成 ${Math.min(3,s.due)} 道错题回测。`,subject:'数学',type:'错题回测',qty:Math.min(3,s.due),min:30,strategies:['自我测试','间隔复习']});if(s.dims.深度专注<60)arr.push({text:'明天第一段学习使用 45 分钟深度学习，结束只点选专注程度。',subject:'其他',type:'深度学习',qty:1,min:45,strategies:['主动回忆']});if(s.dims.主动回忆<50)arr.push({text:'每个科目至少做一次遮挡自测或独立重做。',subject:'其他',type:'自我测试',qty:1,min:20,strategies:['主动回忆','自我测试']});if(s.dims.错题闭环<60)arr.push({text:'选择 3 道已订正错题，完成独立重做。',subject:'数学',type:'错题订正',qty:3,min:30,strategies:['错题复盘','变式训练']});return arr.slice(0,3)}
function renderSuggestions(arr){return arr.length?arr.map((x,i)=>`<div class="item"><div>${x.text}</div><button class="small primary" onclick="addOneSuggestion(${i})">加入明日任务</button></div>`).join(''):'<div class="muted">暂无明显短板，保持低输入记录即可。</div>'}
function addOneSuggestion(i){const s=generateSuggestions()[i];if(!s)return;data.tasks.push({id:id(),date:addDays(today(),1),subject:s.subject,type:s.type,knowledge:'',qty:s.qty||1,planMin:s.min||30,difficulty:'中',name:s.text,standard:s.text,status:'未完成',quality:'未评',strategies:s.strategies||[]});save();toast('已加入明日任务')}
function refreshPermission(){let txt='网页模式：无法读取系统权限。';try{if(window.AndroidBridge){const p=JSON.parse(AndroidBridge.getPermissionStatus());txt=p.usageAccess?'已获得使用情况访问权限':'缺少使用情况访问权限';}}catch(e){}document.getElementById('permBox').innerHTML=`<div class="item"><b>${txt}</b><div class="footerNote">没有权限时，仍可计时、记录、复盘；但不能自动识别学习时用了哪个 App。</div></div>`}
function openUsageSettings(){try{AndroidBridge.openUsageSettings()}catch(e){toast('请在系统设置中搜索：使用情况访问权限')}}
function queryUsageNow(){try{const start=new Date(today()+'T00:00:00').getTime();const end=Date.now();const arr=JSON.parse(AndroidBridge.queryUsageEvents(start,end));data.usageEvents=arr;arr.forEach(e=>{if(e.packageName&&!data.appRules[e.packageName])data.appRules[e.packageName]={appName:e.appName||e.packageName,type:''}});save();render();toast('已读取使用记录')}catch(e){toast('读取失败，可手动导入')}}
function renderSettings(){refreshPermission();renderAppRules()}
function renderAppRules(){const box=document.getElementById('appRuleList');if(!box)return;const keys=Object.keys(data.appRules);if(!keys.length){box.innerHTML='<div class="muted">暂无未分类 App。先读取使用记录，或导入备份。</div>';return}box.innerHTML=keys.map(pkg=>{const r=data.appRules[pkg];return `<div class="item"><b>${r.appName||pkg}</b><div class="muted mono">${pkg}</div><div class="chipbox">${data.appTypes.map(t=>`<button class="chip ${r.type===t.name?'on':''}" onclick="setAppRule('${pkg}','${t.name}')">${r.type===t.name?'✓ ':''}${t.name}</button>`).join('')}</div></div>`}).join('')}
function setAppRule(pkg,type){data.appRules[pkg].type=type;save();renderAppRules()}
function openManageStates(){openModal('状态排序/添加/删除',`<div id="stateManage">${data.states.map((s,i)=>`<div class="item"><div class="row"><b>${s}</b><span><button class="small" onclick="moveState(${i},-1)">上移</button><button class="small" onclick="moveState(${i},1)">下移</button><button class="small danger" onclick="delState(${i})">删</button></span></div></div>`).join('')}</div><div class="split"><input id="newState" placeholder="新状态，如函数错题"><button onclick="addState()">添加</button></div>`)}
function moveState(i,d){const j=i+d;if(j<0||j>=data.states.length)return;[data.states[i],data.states[j]]=[data.states[j],data.states[i]];save();openManageStates();render()}
function delState(i){data.states.splice(i,1);save();openManageStates();render()}
function addState(){const v=document.getElementById('newState').value.trim();if(v&&!data.states.includes(v)){data.states.push(v);save();openManageStates();render()}}
function openManageSubjects(){openModal('科目/知识点',`<div>${data.subjects.map((s,i)=>`<span class="pill">${s} <button class="small danger" onclick="data.subjects.splice(${i},1);save();openManageSubjects()">×</button></span>`).join('')}</div><div class="split" style="margin-top:10px"><input id="newSub" placeholder="新科目"><button onclick="const v=document.getElementById('newSub').value.trim();if(v){data.subjects.push(v);save();openManageSubjects()}">添加</button></div>`)}
function openManageAppTypes(){openModal('App 类型',`${data.appTypes.map((t,i)=>`<div class="item"><b>${t.name}</b><div class="muted">允许：${t.allowed?'是':'否'}｜严重度：${t.severity}</div><button class="small danger" onclick="data.appTypes.splice(${i},1);save();openManageAppTypes();render()">删除</button></div>`).join('')}<div class="field"><label>新增类型</label><input id="newAppType" placeholder="学习资料 / 小说 / 网购"></div><div class="split"><select id="newAllowed"><option value="true">允许</option><option value="false">不允许</option></select><select id="newSeverity"><option>0</option><option>1</option><option>1.5</option><option>2</option><option>2.5</option><option>3</option></select><button onclick="addAppType()">添加</button></div>`)}
function addAppType(){const n=document.getElementById('newAppType').value.trim();if(!n)return;data.appTypes.push({name:n,allowed:document.getElementById('newAllowed').value==='true',severity:+document.getElementById('newSeverity').value});save();openManageAppTypes();render()}
function exportAll(){document.getElementById('jsonBox').value=JSON.stringify({version:'v9',exportedAt:new Date().toISOString(),data},null,2);toast('已导出到文本框')}
function exportAppTypes(){document.getElementById('jsonBox').value=JSON.stringify({version:'v9-app-types',exportedAt:new Date().toISOString(),appTypes:data.appTypes,appRules:data.appRules},null,2);toast('类型已导出')}
function copyJsonBox(){const t=document.getElementById('jsonBox').value;if(!t){toast('文本框为空');return}try{AndroidBridge.copyText(t);toast('已复制')}catch(e){navigator.clipboard.writeText(t).then(()=>toast('已复制')).catch(()=>toast('复制失败，请手动全选'))}}
function saveJsonFile(){const t=document.getElementById('jsonBox').value;if(!t){toast('文本框为空');return}try{const p=AndroidBridge.saveTextFile('student_reflect_backup_'+today()+'.json',t);toast(p.startsWith('ERROR')?'保存失败':'已保存文件')}catch(e){toast('此环境不支持保存，请复制') }}
function importAll(){try{const obj=JSON.parse(document.getElementById('jsonBox').value);if(obj.data){data=obj.data;save();render();toast('已导入全部')}else toast('格式不对')}catch(e){toast('JSON错误')}}
function importAppTypes(){try{const obj=JSON.parse(document.getElementById('jsonBox').value);if(obj.appTypes)data.appTypes=obj.appTypes;if(obj.appRules)data.appRules=obj.appRules;save();render();toast('已导入类型')}catch(e){toast('JSON错误')}}
function tick(){ensureDay();if(data.day.running){document.getElementById('currentStateName').textContent=data.day.currentState||'未开始';document.getElementById('currentSeconds').textContent=fmtTime(Date.now()-data.day.stateStartAt)}else{document.getElementById('currentStateName').textContent='未开始';document.getElementById('currentSeconds').textContent='00:00:00'}}
window.addEventListener('load',()=>{render();tick();timerInt=setInterval(()=>{tick()},1000)});
</script>
</body>
</html>
